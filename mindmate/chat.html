<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MindMate — Chat</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Ccircle cx='16' cy='16' r='9' fill='%238fae93'/%3E%3C/svg%3E">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Public+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/base.css">
<link rel="stylesheet" href="css/chat.css">
</head>
<body>

<div class="horizon-glow"></div>

<nav class="nav">
  <a class="brand" href="index.html"><span class="breath-dot"></span>MindMate</a>
  <a class="nav-action" href="index.html">← Back</a>
</nav>

<div class="chat-wrap">
  <div class="messages" id="messages">
    <div class="intro" id="intro">
      <h1>What's on your mind?</h1>
      <p>MindMate is listening — say as much or as little as you want.</p>
    </div>
  </div>

  <p class="error-note" id="error-note" style="display:none;"></p>

  <div class="input-bar">
    <div class="input-shell">
      <textarea id="msg-input" rows="1" placeholder="Type your message..." aria-label="Message"></textarea>
      <button class="send-btn" id="send-btn" aria-label="Send message">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="19" x2="12" y2="5"></line><polyline points="5 12 12 5 19 12"></polyline></svg>
      </button>
    </div>
  </div>
</div>

<script src="js/chat.js" defer></script>
</body>
</html>
